<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GiftDrop</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

    <div id="app">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <header id="header">
            <div class="logo">🎁 GiftDrop</div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">LIVE</span>
                    <span class="stat-value">2</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">₽</span>
                    <span class="stat-value">0.2</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Free</span>
                    <span class="stat-value">case</span>
                </div>
            </div>
        </header>

        <!-- КОНТЕНТ -->
        <div id="content"></div>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <nav id="navbar">
            <div class="nav-item active" data-page="top">
                <span class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                </span>
                <span class="nav-label">Топ</span>
            </div>
            <div class="nav-item" data-page="home">
                <span class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12L12 3L21 12"/>
                        <path d="M5 10V20H19V10"/>
                        <path d="M9 20V14H15V20"/>
                    </svg>
                </span>
                <span class="nav-label">Главная</span>
            </div>
            <div class="nav-item" data-page="profile">
                <span class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21V19C20 16.7909 18.2091 15 16 15H8C5.79086 15 4 16.7909 4 19V21"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                <span class="nav-label">Профиль</span>
            </div>
        </nav>
    </div>

    <!-- ПОДКЛЮЧАЕМ СКРИПТЫ -->
    <script src="scripts/router.js"></script>
    <script src="scripts/games/coin.js"></script>
    <script src="scripts/games/cases.js"></script>
</body>
</html>
